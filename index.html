<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>XPALLA — Personal Brand Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --cream:#FAF6EF;--cream-2:#F2EBDF;--ink:#211E1A;--ink-soft:#4A453E;--muted:#8A8276;
    --line:#E2D9C9;--plum:#6B3F5B;--plum-deep:#532E47;--gold:#B08D57;--gold-soft:#C9AE82;
    --rose:#F0E4E9;--white:#FFFFFF;--ig:#C13584;--li:#2E5C8A;
    --shadow:0 18px 50px -28px rgba(43,28,46,.45);--shadow-sm:0 8px 24px -16px rgba(43,28,46,.4);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--cream);color:var(--ink);font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased;line-height:1.55}
  .serif{font-family:'Cormorant Garamond',Georgia,serif}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,textarea,select{font-family:inherit;color:inherit}
  ::selection{background:var(--plum);color:var(--cream)}

  .app{display:flex;min-height:100vh}
  .sidebar{width:260px;flex-shrink:0;background:var(--ink);color:var(--cream);padding:34px 26px;display:flex;flex-direction:column;position:sticky;top:0;height:100vh}
  .brandmark{display:flex;flex-direction:column;gap:2px;margin-bottom:46px}
  .brandmark .name{font-family:'Cormorant Garamond',serif;font-size:30px;letter-spacing:.32em;font-weight:600}
  .brandmark .tag{font-size:10.5px;letter-spacing:.34em;text-transform:uppercase;color:var(--gold-soft)}
  .nav{display:flex;flex-direction:column;gap:4px}
  .nav-label{font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:#8d8475;margin:0 0 10px 8px}
  .nav button{display:flex;align-items:center;gap:13px;width:100%;text-align:left;padding:12px 14px;border-radius:11px;color:#cfc7b8;font-size:14px;transition:.18s}
  .nav button .ic{width:18px;text-align:center;font-size:15px;opacity:.85}
  .nav button:hover{background:rgba(255,255,255,.06);color:var(--cream)}
  .nav button.active{background:var(--plum);color:#fff;box-shadow:var(--shadow-sm)}
  .side-foot{margin-top:auto;padding-top:24px;border-top:1px solid rgba(255,255,255,.1)}
  .profile-chip{display:flex;align-items:center;gap:12px}
  .avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--plum));display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:#fff;flex-shrink:0}
  .profile-chip .pname{font-size:13px;font-weight:500;color:var(--cream)}
  .profile-chip .pstat{font-size:11px;color:#8d8475}

  .main{flex:1;min-width:0;display:flex;flex-direction:column}
  .topbar{padding:30px 56px 0;display:flex;justify-content:space-between;align-items:flex-end}
  .topbar .crumb{font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}
  .topbar h1{font-family:'Cormorant Garamond',serif;font-size:42px;font-weight:600;line-height:1.05;margin-top:6px}
  .topbar .sub{color:var(--ink-soft);font-size:14.5px;margin-top:8px;max-width:600px}
  .content{padding:34px 56px 70px;flex:1}

  .btn{display:inline-flex;align-items:center;gap:9px;padding:12px 22px;border-radius:999px;font-size:13.5px;font-weight:500;transition:.18s;white-space:nowrap}
  .btn-primary{background:var(--plum);color:#fff;box-shadow:var(--shadow-sm)}
  .btn-primary:hover{background:var(--plum-deep);transform:translateY(-1px)}
  .btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
  .btn-ghost:hover{border-color:var(--plum);color:var(--plum)}
  .btn-gold{background:var(--gold);color:#fff}
  .btn-gold:hover{background:#9c7b46}
  .btn:disabled{opacity:.45;cursor:not-allowed;transform:none}

  .card{background:var(--white);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}
  .pad{padding:30px 32px}
  .grid{display:grid;gap:24px}
  .g3{grid-template-columns:repeat(3,1fr)}
  .g2{grid-template-columns:.92fr 1.08fr}
  @media(max-width:1180px){.g2{grid-template-columns:1fr}}
  @media(max-width:1080px){.g3{grid-template-columns:1fr 1fr}}

  label.fl{display:block;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;font-weight:500}
  .field{margin-bottom:20px}
  input.tin,textarea.tin,select.tin{width:100%;background:var(--cream);border:1px solid var(--line);border-radius:11px;padding:13px 15px;font-size:14.5px;color:var(--ink);transition:.16s;resize:vertical}
  input.tin:focus,textarea.tin:focus,select.tin:focus{outline:none;border-color:var(--plum);background:#fff;box-shadow:0 0 0 3px var(--rose)}
  textarea.tin{min-height:90px;line-height:1.6}
  .hint{font-size:12px;color:var(--muted);margin-top:6px}

  .chips{display:flex;flex-wrap:wrap;gap:9px}
  .chip{padding:8px 15px;border-radius:999px;border:1px solid var(--line);background:#fff;font-size:13px;color:var(--ink-soft);transition:.15s}
  .chip:hover{border-color:var(--gold)}
  .chip.on{background:var(--ink);color:var(--cream);border-color:var(--ink)}

  .eyebrow{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);font-weight:600}
  .cardtitle{font-family:'Cormorant Garamond',serif;font-size:25px;font-weight:600;margin:4px 0 2px}
  .divider{height:1px;background:var(--line);margin:22px 0}
  .pill{display:inline-block;padding:4px 11px;border-radius:999px;font-size:11px;letter-spacing:.05em;background:var(--cream-2);color:var(--ink-soft)}
  .pill.plum{background:var(--rose);color:var(--plum)}
  .pill.gold{background:#f3ead9;color:#8a6a37}

  .stepbar{display:flex;gap:10px;margin-bottom:30px}
  .step{flex:1;height:4px;border-radius:4px;background:var(--line)}
  .step.done{background:var(--gold)}.step.cur{background:var(--plum)}
  .stepmeta{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
  .stepmeta .n{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted)}

  /* segmented control */
  .seg{display:flex;gap:6px;background:var(--cream-2);padding:5px;border-radius:12px;flex-wrap:wrap}
  .seg button{padding:9px 16px;border-radius:9px;font-size:13px;font-weight:500;color:var(--ink-soft);transition:.15s;flex:1;white-space:nowrap}
  .seg button.on{background:#fff;color:var(--plum);box-shadow:var(--shadow-sm)}
  .seg.li button.on{color:var(--li)}.seg.ig button.on{color:var(--ig)}

  /* output sections */
  .section{margin-bottom:18px}
  .sechead{display:flex;align-items:center;justify-content:space-between;margin-bottom:7px;gap:10px}
  .seclabel{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .copybtn{font-size:11.5px;color:var(--plum);border:1px solid var(--line);border-radius:8px;padding:5px 11px;transition:.15s;flex-shrink:0}
  .copybtn:hover{border-color:var(--plum);background:var(--rose)}
  .secbody{background:linear-gradient(180deg,#fff,#fdfbf6);border:1px solid var(--line);border-radius:11px;padding:16px 18px;white-space:pre-wrap;font-size:14px;line-height:1.66;color:var(--ink-soft)}
  .secbody.hook{border-left:3px solid var(--gold);font-size:15px;color:var(--ink);font-weight:500}
  .secbody.muted{color:var(--muted);font-size:13px}

  /* carousel preview */
  .carousel{margin-bottom:18px}
  .slidecard{background:linear-gradient(150deg,#2a2330,#43304a);border-radius:16px;color:#fff;padding:34px 30px;min-height:300px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden}
  .slidecard.cover{background:linear-gradient(150deg,var(--plum-deep),var(--plum))}
  .slidecard.cta{background:linear-gradient(150deg,#3a2c1a,#7a5e34)}
  .slidecard .kicker{font-size:10.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold-soft);margin-bottom:14px}
  .slidecard .stitle{font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:600;line-height:1.12;margin-bottom:12px}
  .slidecard .sbody{font-size:14.5px;line-height:1.6;color:#ece6df;white-space:pre-wrap}
  .slidecard .snum{position:absolute;top:18px;right:22px;font-size:12px;color:rgba(255,255,255,.5)}
  .slidecard .mediabadge{position:absolute;bottom:16px;left:24px;font-size:11px;color:var(--gold-soft);display:flex;align-items:center;gap:6px}
  .slidethumb{position:absolute;inset:0;opacity:.22;object-fit:cover;width:100%;height:100%}
  /* output actions */
  .resultbar{display:flex;align-items:center;gap:10px;margin-bottom:16px}
  .copypost{font-size:12.5px;font-weight:500;color:#fff;background:var(--plum);border-radius:9px;padding:9px 16px;transition:.15s}
  .copypost:hover{background:var(--plum-deep)}
  /* output editing */
  .editall{margin-left:auto;font-size:11.5px;color:var(--plum);border:1px solid var(--line);border-radius:8px;padding:5px 12px;transition:.15s}
  .editall:hover{border-color:var(--plum);background:var(--rose)}
  .editarea{width:100%;min-height:96px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:13px 15px;font-family:'Inter',sans-serif;font-size:14px;line-height:1.65;color:var(--ink);resize:vertical}
  .editarea:focus{outline:none;border-color:var(--plum);box-shadow:0 0 0 3px var(--rose)}
  .editline{width:100%;background:#fff;border:1px solid var(--line);border-radius:9px;padding:10px 13px;font-size:14px;color:var(--ink)}
  .editline:focus{outline:none;border-color:var(--plum);box-shadow:0 0 0 3px var(--rose)}
  .runtime{font-size:11.5px;color:var(--muted);margin-top:8px;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
  /* slide inline editing */
  .sedit-title{width:100%;background:rgba(255,255,255,.93);border:1px solid rgba(0,0,0,.12);border-radius:8px;padding:9px 11px;font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:#211E1A;margin-bottom:10px;z-index:2;position:relative}
  .sedit-body{width:100%;min-height:96px;background:rgba(255,255,255,.93);border:1px solid rgba(0,0,0,.12);border-radius:8px;padding:9px 11px;font-family:'Inter',sans-serif;font-size:14px;color:#211E1A;line-height:1.55;resize:vertical;z-index:2;position:relative}
  .sedit-title:focus,.sedit-body:focus{outline:none;border-color:var(--plum);box-shadow:0 0 0 3px rgba(107,63,91,.25)}
  /* brand kit on slides */
  .kitlogo-slide{position:absolute;top:16px;left:20px;max-height:26px;max-width:96px;object-fit:contain;z-index:3}
  .kithandle{position:absolute;bottom:15px;right:22px;font-size:12px;font-weight:500;z-index:3}
  /* brand kit editor */
  .kitrow{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--ink-soft);margin-bottom:14px;cursor:pointer}
  .kitgrid{display:flex;gap:14px;margin-bottom:6px;flex-wrap:wrap}
  .kitgrid>div{flex:1;min-width:88px}
  input[type=color]{width:100%;height:38px;border:1px solid var(--line);border-radius:9px;background:var(--cream);padding:3px;cursor:pointer}
  .kitlogo{display:flex;align-items:center;gap:10px;margin-top:6px}
  .kitlogo img{height:38px;max-width:130px;object-fit:contain;border:1px solid var(--line);border-radius:7px;background:#fff;padding:4px}
  .slidenav{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
  .dots{display:flex;gap:6px;flex-wrap:wrap}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--line);transition:.15s;cursor:pointer}
  .dot.on{background:var(--plum);transform:scale(1.25)}
  .navbtn{width:34px;height:34px;border-radius:50%;border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:15px;color:var(--ink-soft);transition:.15s}
  .navbtn:hover{border-color:var(--plum);color:var(--plum)}
  .navbtn:disabled{opacity:.35}

  /* media tray */
  .dropzone{border:1.5px dashed var(--gold-soft);border-radius:13px;padding:20px;text-align:center;background:#fdf9f1;transition:.15s;cursor:pointer}
  .dropzone:hover{border-color:var(--gold);background:#fbf4e7}
  .dropzone .dz-ic{font-size:22px;color:var(--gold)}
  .dropzone .dz-t{font-size:13.5px;color:var(--ink-soft);margin-top:6px;font-weight:500}
  .dropzone .dz-s{font-size:11.5px;color:var(--muted);margin-top:2px}
  .mediatray{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
  .mediaitem{position:relative;width:74px;height:74px;border-radius:11px;overflow:hidden;border:1px solid var(--line);background:var(--cream-2)}
  .mediaitem img,.mediaitem video{width:100%;height:100%;object-fit:cover}
  .mediaitem .vlabel{position:absolute;bottom:3px;left:4px;font-size:9px;background:rgba(0,0,0,.6);color:#fff;padding:1px 5px;border-radius:5px}
  .mediaitem .rm{position:absolute;top:3px;right:3px;width:18px;height:18px;border-radius:50%;background:rgba(33,30,26,.85);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center}

  /* playbook */
  .playbook{background:#fbf7f0;border:1px solid var(--line);border-radius:14px;padding:20px 22px;margin-top:6px}
  .pb-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px}
  @media(max-width:760px){.pb-grid{grid-template-columns:1fr}}
  .pb-h{font-size:11px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:7px}
  .pb-h.why{color:var(--plum)}.pb-h.pre{color:var(--gold)}
  .pb-list{list-style:none;display:flex;flex-direction:column;gap:9px}
  .pb-list li{font-size:13px;color:var(--ink-soft);line-height:1.5;padding-left:20px;position:relative}
  .pb-list li:before{content:"›";position:absolute;left:4px;color:var(--gold);font-weight:700}
  .pb-list.pre li:before{content:"○";font-size:10px;top:3px}

  /* A/B hook variants */
  .variants{margin-bottom:18px}
  .vtabs{display:flex;flex-direction:column;gap:8px}
  .vtab{text-align:left;border:1px solid var(--line);border-radius:11px;padding:11px 14px;background:#fff;transition:.15s;display:flex;flex-direction:column;gap:3px}
  .vtab:hover{border-color:var(--gold)}
  .vtab.on{border-color:var(--plum);background:var(--rose);box-shadow:var(--shadow-sm)}
  .vtab .vlabel2{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);font-weight:600}
  .vtab.on .vlabel2{color:var(--plum)}
  .vtab .vtext{font-size:13.5px;color:var(--ink);font-weight:500;line-height:1.4}

  /* hook library */
  .libtoggle{font-size:12.5px;color:var(--plum);border:1px dashed var(--gold-soft);border-radius:9px;padding:9px 12px;width:100%;text-align:left;margin-top:10px;transition:.15s}
  .libtoggle:hover{border-color:var(--plum);background:var(--rose)}
  .libpanel{border:1px solid var(--line);border-radius:12px;padding:14px 16px;margin-top:10px;background:#fdfbf6;max-height:330px;overflow:auto}
  .libgroup{margin-bottom:14px}
  .libgroup:last-child{margin-bottom:0}
  .lgh{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center}
  .usebtn{font-size:9.5px;color:var(--plum);cursor:pointer;border:1px solid var(--line);border-radius:6px;padding:3px 8px;letter-spacing:.04em}
  .usebtn:hover{background:var(--rose);border-color:var(--plum)}
  .libhook{display:flex;justify-content:space-between;gap:10px;align-items:flex-start;font-size:12.5px;color:var(--ink-soft);padding:7px 0;border-top:1px solid var(--line);white-space:pre-wrap;line-height:1.45}
  .libhook .lcopy{flex-shrink:0;cursor:pointer;color:var(--plum);font-size:11px;border:1px solid var(--line);border-radius:6px;padding:3px 7px}
  .libhook .lcopy:hover{background:var(--rose);border-color:var(--plum)}
  /* auth + boot */
  .bootscreen{height:100vh;display:flex;align-items:center;justify-content:center;background:var(--ink)}
  .bootscreen .serif{font-size:36px;letter-spacing:.34em;color:var(--gold);font-weight:600;animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:.5}50%{opacity:1}}
  .authwrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:30px;background:radial-gradient(circle at 30% 20%,#fff,var(--cream))}
  .authcard{background:var(--white);border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);padding:40px 38px;width:100%;max-width:410px}
  .tagline{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:16.5px;line-height:1.45;color:var(--plum);text-align:center;margin:0 0 22px;padding:14px 6px 0;border-top:1px solid var(--line)}
  .autherr{background:#fbeae7;border:1px solid #e7c3bc;color:#a3463b;font-size:12.5px;border-radius:9px;padding:9px 12px;margin-bottom:12px}
  .authlink{color:var(--plum);font-weight:600;cursor:pointer;border-bottom:1px solid var(--gold-soft)}
  .logoutbtn{flex-shrink:0;width:30px;height:30px;border-radius:8px;color:#9b9384;font-size:15px;transition:.15s}
  .logoutbtn:hover{background:rgba(255,255,255,.08);color:var(--cream)}

  /* analytics */
  .g4{grid-template-columns:repeat(4,1fr)}
  @media(max-width:980px){.g4{grid-template-columns:1fr 1fr}}
  .platrow{display:flex;justify-content:space-between;align-items:center;margin-top:10px;gap:8px}
  .barrow{display:flex;align-items:center;gap:12px;margin-bottom:11px}
  .barlabel{width:130px;font-size:12.5px;color:var(--ink-soft);flex-shrink:0}
  .bar{flex:1;height:12px;background:var(--cream-2);border-radius:6px;overflow:hidden}
  .barfill{height:100%;background:linear-gradient(90deg,var(--gold),var(--plum));border-radius:6px;transition:width .5s}
  .barval{width:50px;text-align:right;font-size:12.5px;font-weight:600;color:var(--plum)}
  .tablewrap{overflow-x:auto}
  .atable{width:100%;border-collapse:collapse;font-size:13px}
  .atable th{text-align:left;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:0 8px 10px;border-bottom:1px solid var(--line)}
  .atable td{padding:10px 8px;border-bottom:1px solid var(--line);vertical-align:middle}
  .postcell{display:flex;gap:9px;align-items:flex-start;min-width:230px}
  .dotp{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
  .dotp.ig{background:var(--ig)}.dotp.li{background:var(--li)}
  .postcell .pt{font-weight:500;color:var(--ink);line-height:1.35;font-size:12.5px}
  .postcell .pf{font-size:11px;color:var(--muted);margin-top:2px}
  .min{width:62px;background:var(--cream);border:1px solid var(--line);border-radius:7px;padding:6px 8px;font-size:12.5px;text-align:right}
  .min:focus{outline:none;border-color:var(--plum);background:#fff}
  .ercell{font-weight:600;color:var(--plum);white-space:nowrap}

  /* best time callout */
  .besttime{display:flex;align-items:flex-start;gap:11px;background:linear-gradient(100deg,#f3ead9,#fbf7f0);border:1px solid var(--gold-soft);border-radius:12px;padding:13px 16px;margin-bottom:18px;font-size:13.5px;color:var(--ink)}
  .besttime .bt-ic{font-size:17px}
  .besttime .bt-why{color:var(--muted)}

  /* AI status */
  .aistat{display:flex;align-items:center;gap:8px;font-size:11.5px;color:#a59c8c;margin-bottom:14px}
  .dotai{width:7px;height:7px;border-radius:50%;background:#7d7567}
  .dotai.on{background:#7bbf8f;box-shadow:0 0 0 3px rgba(123,191,143,.2)}

  /* drafts */
  .draftrow{display:flex;gap:14px;overflow-x:auto;padding:14px 2px 4px;margin-top:6px}
  .draftcard{flex:0 0 270px;border:1px solid var(--line);border-radius:13px;padding:15px 16px;background:#fdfbf6;transition:.15s}
  .draftcard.sel{border-color:var(--plum);box-shadow:var(--shadow-sm);background:var(--rose)}
  .draftcard .dtitle{font-size:14px;font-weight:500;color:var(--ink);margin:9px 0 11px;line-height:1.4}
  .dactions{display:flex;flex-wrap:wrap;gap:6px}
  .mini{font-size:11px;color:var(--ink-soft);border:1px solid var(--line);border-radius:7px;padding:4px 9px;transition:.15s;background:#fff}
  .mini:hover{border-color:var(--plum);color:var(--plum)}
  .mini.danger:hover{border-color:#b5544a;color:#b5544a}
  .dfull{margin-top:11px;padding-top:11px;border-top:1px solid var(--line);font-size:12px;color:var(--ink-soft);white-space:pre-wrap;line-height:1.5;max-height:200px;overflow:auto}

  /* week calendar */
  .weeknav{display:flex;align-items:center;gap:14px;margin-bottom:18px}
  .weekgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
  @media(max-width:900px){.weekgrid{grid-template-columns:repeat(7,minmax(120px,1fr));overflow-x:auto}}
  .daycol{background:var(--cream);border:1px solid var(--line);border-radius:11px;padding:9px;min-height:150px;transition:.15s}
  .daycol.istoday{border-color:var(--gold);background:#fdf9f1}
  .daycol.droptarget{cursor:pointer;border-style:dashed;border-color:var(--gold-soft)}
  .daycol.droptarget:hover{background:var(--rose);border-color:var(--plum)}
  .dayhead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;padding:0 2px}
  .dayhead .dn{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .dayhead .dd{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;color:var(--ink)}
  .dropcue{font-size:10.5px;color:var(--plum);text-align:center;padding:6px;border:1px dashed var(--gold-soft);border-radius:8px;margin-bottom:6px}
  .evt{background:#fff;border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:9px;padding:8px 9px;margin-bottom:7px}
  .evt.ig{border-left-color:var(--ig)}.evt.li{border-left-color:var(--li)}
  .evt .etime{font-size:10.5px;font-weight:600;color:var(--plum)}
  .evt .etitle{font-size:12px;color:var(--ink);line-height:1.35;margin:3px 0;font-weight:500}
  .evt .efmt{font-size:10px;color:var(--muted);margin-bottom:6px}
  .evt .dactions{gap:4px}
  .evt .mini{font-size:10px;padding:3px 6px}
  .metarow{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:16px;align-items:center}
  .empty{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px 30px;color:var(--muted);min-height:340px}
  .empty .big{font-family:'Cormorant Garamond',serif;font-size:40px;color:var(--line);margin-bottom:8px}
  .loading{display:inline-flex;gap:5px;align-items:center}
  .loading i{width:6px;height:6px;border-radius:50%;background:var(--plum);display:inline-block;animation:bb 1s infinite}
  .loading i:nth-child(2){animation-delay:.15s}.loading i:nth-child(3){animation-delay:.3s}
  @keyframes bb{0%,100%{opacity:.25;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}
  .stat{background:var(--white);border:1px solid var(--line);border-radius:16px;padding:22px 24px}
  .stat .k{font-family:'Cormorant Garamond',serif;font-size:34px;font-weight:600;color:var(--plum)}
  .stat .l{font-size:12px;letter-spacing:.06em;color:var(--muted);margin-top:2px}
  .modcard{cursor:pointer;transition:.2s;position:relative;overflow:hidden}
  .modcard:hover{transform:translateY(-3px);box-shadow:var(--shadow)}
  .modcard .ic{font-size:22px;width:50px;height:50px;border-radius:13px;display:flex;align-items:center;justify-content:center;background:var(--rose);margin-bottom:16px}
  .modcard .arrow{position:absolute;top:26px;right:28px;color:var(--gold);font-size:18px;opacity:0;transition:.2s}
  .modcard:hover .arrow{opacity:1;transform:translateX(3px)}
  .fade{animation:fade .4s ease}
  @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--cream);padding:13px 22px;border-radius:999px;font-size:13px;box-shadow:var(--shadow);z-index:50;animation:fade .3s}
  .output{white-space:pre-wrap;font-size:14.5px;line-height:1.7;color:var(--ink-soft);background:linear-gradient(180deg,#fff,#fdfbf6);border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:12px;padding:22px 24px}
  .output strong{color:var(--ink);font-weight:600}
  .gen-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
</style>
</head>

<div id="root"><div style="height:100vh;display:flex;align-items:center;justify-content:center;background:#211E1A"><span style="font-family:'Cormorant Garamond',Georgia,serif;font-size:34px;letter-spacing:.3em;color:#B08D57">XPALLA</span></div></div>

<script src="app.js"></script>
